<!doctype html>
<html lang="en">
  <body>
    <h3>Destructuring Demo - 1</h3>
    <script>
      const myarr = [55, 99];
      const [a, b] = myarr;
      console.log(a);
      console.log(b);

      const mycourses = [
        "java",
        "html",
        "css",
        "javascript",
        "spring-boot",
        "react",
      ];
      const [x, y, c, d, e, f,g] = mycourses;
      console.log(x);
      console.log(y);
      console.log(c);
      console.log(d);
      console.log(e);
      console.log(f);
      console.log(g);
      console.log("Done!!!");
    </script>
  </body>
</html>
