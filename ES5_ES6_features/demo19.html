<!doctype html>
<html lang="en">
  <body>
    <h3>Destructuring Demo - 2</h3>
    <script>
      const myarr = [55, 66, 77, 88, 99];
      const [x, y, ...remArr] = myarr; //rest operator must be used only last not aywhere else
      console.log("x = ", x);
      console.log("y = ",y);
      console.log("remArr = ",remArr);
      console.log("Done!!!");
    </script>
  </body>
</html>
