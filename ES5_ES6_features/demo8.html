<!doctype html>
<html lang="en">
  <body>
    <h3>Arrow Functions Demo-2</h3>
    <script>
      show1 = () => {
        console.log("I am show 1");
      };

      const show2 = (x) => {
        console.log("I am show 2", x);
      };

      const findsum = (x, y) =>{
        return x+y;
      }

      show1();
      show2(10);
      const res = findsum(10,20);
      console.log(res);
      
      console.log("Done!!!");
    </script>
  </body>
</html>
